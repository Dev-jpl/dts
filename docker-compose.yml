services:
  embedding:
    build: ./services/embedding
    ports:
      - "5100:5100"
    restart: unless-stopped
    volumes:
      - embedding-model-cache:/root/.cache
    environment:
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  embedding-model-cache:
